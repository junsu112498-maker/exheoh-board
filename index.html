<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>설계팀 업무 보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e2e0d8;
  --border2: #c8c5ba;
  --text: #1a1916;
  --text2: #5a5750;
  --text3: #9e9b91;
  --blue: #2563eb; --blue-bg: #eff4ff; --blue-txt: #1d4ed8; --blue-bd: #bfdbfe;
  --green: #16a34a; --green-bg: #f0fdf4; --green-txt: #15803d; --green-bd: #bbf7d0;
  --amber: #d97706; --amber-bg: #fffbeb; --amber-txt: #b45309; --amber-bd: #fde68a;
  --purple: #7c3aed; --purple-bg: #f5f3ff; --purple-txt: #6d28d9; --purple-bd: #ddd6fe;
  --red: #dc2626; --red-bg: #fef2f2; --red-txt: #b91c1c; --red-bd: #fecaca;
  --teal: #0891b2; --teal-bg: #ecfeff; --teal-txt: #0e7490; --teal-bd: #a5f3fc;
  --radius: 9px; --radius-lg: 13px;
  --font: 'Noto Sans KR', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: transparent; font-family: var(--font); color: var(--text); overflow: hidden; border-radius: 16px; }

.widget-shell {
  width: 100%; height: 100vh;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  position: relative;
}

/* ── 타이틀바 ── */
.titlebar {
  -webkit-app-region: drag;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 9px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.titlebar-left { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 18px; height: 18px; }
.logo-text { font-size: 13px; font-weight: 700; color: var(--text); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.titlebar-right { display: flex; gap: 7px; -webkit-app-region: no-drag; align-items: center; }
.win-btn { width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer; font-size: 0; transition: opacity .15s; flex-shrink:0; display:inline-block; }
.btn-close { background: #ff5f57; }
.btn-min   { background: #febc2e; }
.win-btn:hover { opacity: .75; }

/* ── 탭 ── */
.tabs { display: flex; padding: 0 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { padding: 8px 12px; font-size: 12px; font-weight: 500; color: var(--text2); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: var(--font); transition: color .15s, border-color .15s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

/* ── 패널 ── */
.panel { display: none; flex: 1; overflow-y: auto; padding: 12px; background: var(--bg); }
.panel.active { display: block; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── 입력 폼 ── */
.input-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 11px 13px; margin-bottom: 10px; }
.input-row { display: flex; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; align-items: center; }
  .input-row.time-row { flex-wrap: nowrap; overflow-x: auto; }
input[type=time] { min-width: 108px; }
  input[type=text], input[type=date], input[type=time], select, textarea {
  font-family: var(--font); font-size: 12px; color: var(--text);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 9px; outline: none; transition: border-color .15s, background .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--blue); background: #fff; }
input[type=date]::-webkit-calendar-picker-indicator { opacity: .5; cursor: pointer; }
select option { background: #fff; color: var(--text); }
.inp-name { width: 88px; }
.inp-tag { width: 96px; }
.inp-date { width: 126px; }
.inp-time { width: 82px; }
.inp-proj { flex: 1; width: 100%; }
textarea { width: 100%; resize: none; min-height: 50px; line-height: 1.5; }
.tilde { color: var(--text3); font-size: 11px; padding: 0 1px; }
.btn-submit {
  width: 100%; margin-top: 6px;
  background: var(--blue); color: #fff;
  border: none; border-radius: 7px;
  padding: 7px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: opacity .15s;
}
.btn-submit:hover { opacity: .88; }

/* ── 섹션바 ── */
.section-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.sec-label { font-size: 11px; font-weight: 700; color: var(--text2); }
.cnt-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 1px 7px; font-size: 10px; color: var(--text2); font-family: var(--mono); }
.filters { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
.fbtn { font-size: 11px; padding: 2px 9px; border-radius: 99px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: var(--font); transition: all .12s; }
.fbtn:hover { background: var(--surface2); }
.fbtn.on { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ── 상태 태그 ── */
.tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
.t작업중   { background: var(--blue-bg);   color: var(--blue-txt);   border-color: var(--blue-bd); }
.t작업완료 { background: var(--green-bg);  color: var(--green-txt);  border-color: var(--green-bd); }
.t1차송부  { background: var(--teal-bg);   color: var(--teal-txt);   border-color: var(--teal-bd); }
.t납품     { background: var(--purple-bg); color: var(--purple-txt); border-color: var(--purple-bd); }
.t작업예정 { background: var(--amber-bg);  color: var(--amber-txt);  border-color: var(--amber-bd); }

/* ── 카드 ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 7px; position: relative; transition: border-color .12s, box-shadow .12s; }
.card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.card-hd { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.av { width: 28px; height: 28px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.meta { flex: 1; min-width: 0; }
.meta-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meta-time { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 1px; white-space: nowrap; }
.proj-badge { font-size: 10px; padding: 2px 7px; border-radius: 5px; display: inline-block; font-weight: 600; margin-bottom: 5px; border: 1px solid transparent; }
.card-body { font-size: 12px; color: var(--text2); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.card-actions { position: absolute; top: 7px; right: 8px; display: flex; gap: 2px; }
.act-btn { background: none; border: none; font-size: 11px; color: var(--text3); cursor: pointer; padding: 2px 5px; border-radius: 5px; transition: all .1s; }
.act-btn:hover { color: var(--text); background: var(--surface2); }
.empty { text-align: center; color: var(--text3); font-size: 12px; padding: 2rem 1rem; border: 1.5px dashed var(--border2); border-radius: var(--radius); }

/* ── 달력 ── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-title { font-size: 13px; font-weight: 700; color: var(--text); }
.cal-nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 12px; color: var(--text2); font-family: var(--font); transition: background .12s; }
.cal-nav-btn:hover { background: var(--surface2); }
.cal-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 1px; border-radius: 8px; overflow: hidden; background: var(--border); }
.cal-dow { background: var(--surface2); text-align: center; font-size: 10px; font-weight: 700; color: var(--text3); padding: 5px 0; }
.cal-cell { background: var(--surface); min-height: 52px; padding: 4px; cursor: pointer; transition: background .1s; }
.cal-cell:hover { background: var(--blue-bg); }
.cal-cell.today .cal-num { background: var(--blue); color: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
.cal-cell.other-month { background: var(--bg); }
.cal-cell.other-month .cal-num { color: var(--text3); }
.cal-num { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 2px; font-family: var(--mono); line-height: 1; }
.cal-dots { display: flex; flex-direction: column; gap: 1px; }
.cal-dot { font-size: 9px; padding: 1px 3px; border-radius: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
.cal-detail { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-top: 8px; }
.cal-detail-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.cal-entry { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.cal-entry:last-child { border-bottom: none; }
.cal-entry-info { flex: 1; min-width: 0; }
.cal-entry-name { font-size: 11px; font-weight: 700; color: var(--text); }
.cal-entry-body { font-size: 11px; color: var(--text2); line-height: 1.45; margin-top: 2px; word-break: break-word; }
.cal-entry-acts { display: flex; gap: 2px; flex-shrink: 0; }

/* ── 통계 ── */
.stat-summary { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-bottom: 10px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 11px; }
.stat-box-lbl { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-weight: 600; }
.stat-box-val { font-size: 22px; font-weight: 700; color: var(--text); font-family: var(--mono); }
.stats-section-title { font-size: 11px; font-weight: 700; color: var(--text2); margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.person-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 7px; }
.person-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.person-meta { flex: 1; }
.person-name { font-size: 12px; font-weight: 700; color: var(--text); }
.person-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
.person-badges { display: flex; gap: 3px; flex-wrap: wrap; }
.proj-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
.proj-row:last-child { border-bottom: none; }
.proj-row-name { flex: 1; color: var(--text2); font-weight: 500; }
.proj-row-cnt { color: var(--text3); font-family: var(--mono); font-size: 10px; min-width: 28px; text-align: right; }
.proj-row-time { color: var(--blue-txt); font-family: var(--mono); font-size: 10px; min-width: 52px; text-align: right; background: var(--blue-bg); border-radius: 4px; padding: 1px 5px; }
/* 월별 통계 */
.month-section { margin-bottom: 10px; }
.month-title { font-size: 11px; font-weight: 700; color: var(--text); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 9px; margin-bottom: 5px; display: inline-block; }
.month-person-row { display: flex; align-items: flex-start; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
.month-person-row:last-child { border-bottom: none; }
.month-person-name { font-weight: 700; color: var(--text); min-width: 40px; }
.month-person-projs { flex: 1; display: flex; flex-wrap: wrap; gap: 3px; }
.month-proj-chip { font-size: 10px; background: var(--blue-bg); color: var(--blue-txt); border: 1px solid var(--blue-bd); border-radius: 4px; padding: 1px 6px; }
.month-person-stats { font-family: var(--mono); font-size: 10px; color: var(--text3); white-space: nowrap; min-width: 70px; text-align: right; }

/* ── 프로젝트 관리 ── */
.proj-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 11px; margin-bottom: 6px; }
.proj-item-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.proj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.proj-info { flex: 1; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; min-width: 0; }
.proj-tag-badge { font-size: 10px; border-radius: 4px; padding: 1px 6px; border: 1px solid; font-weight: 600; }
.proj-edit-row { display: none; gap: 5px; flex-wrap: wrap; margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); }
.proj-edit-row.open { display: flex; }
.add-proj-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.inp-sm { font-size: 11px; padding: 5px 8px; }
.btn-add { background: var(--blue); color: #fff; border: none; border-radius: 6px; padding: 5px 11px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity .15s; }
.btn-add:hover { opacity: .88; }
.btn-ghost-sm { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); border-radius: 6px; padding: 4px 9px; font-size: 10px; cursor: pointer; font-family: var(--font); transition: background .12s; }
.btn-ghost-sm:hover { background: var(--border); }

/* ── 모달 ── */
.modal-bg { display: none; position: absolute; inset: 0; background: rgba(0,0,0,.35); z-index: 900; align-items: center; justify-content: center; border-radius: 16px; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 16px 18px; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,.14); }
.modal-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.modal label { font-size: 11px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 3px; margin-top: 8px; }
.modal input, .modal select, .modal textarea { width: 100%; }
.modal textarea { min-height: 60px; }
.modal-btns { display: flex; justify-content: flex-end; gap: 6px; margin-top: 12px; }
.btn-cancel-m { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: var(--font); }
.btn-save-m { background: var(--blue); color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity .15s; }
.btn-save-m:hover { opacity: .88; }

/* ── 사용자 선택 화면 ── */
.user-select-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 16px; padding: 20px;
}
.user-select-overlay.open { display: flex; }
.user-select-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.user-select-sub { font-size: 11px; color: var(--text3); margin-bottom: 14px; }
.user-btn-list { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 260px; max-height: 320px; overflow-y: auto; }
.user-btn-row { display: flex; align-items: center; gap: 4px; width: 100%; }
.user-btn {
  flex: 1; padding: 9px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  color: var(--text); cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; gap: 8px;
  transition: border-color .15s, background .15s;
}
.user-btn:hover { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue-txt); }
.user-btn .user-av { width: 28px; height: 28px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.user-btn-name { flex: 1; text-align: left; }
.user-btn-acts { display: flex; gap: 3px; margin-left: auto; }
.user-btn-edit, .user-btn-del {
  background: none; border: none; font-size: 11px; cursor: pointer;
  padding: 2px 5px; border-radius: 4px; color: var(--text3);
  font-family: var(--font);
}
.user-btn-edit:hover { background: var(--surface2); color: var(--text); }
.user-btn-del:hover { background: var(--red-bg); color: var(--red-txt); }
.user-add-row { display: flex; gap: 6px; margin-top: 10px; width: 100%; max-width: 260px; }
.user-add-row input { flex: 1; font-size: 12px; padding: 6px 9px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); outline: none; }
.user-add-row input:focus { border-color: var(--blue); }
.user-add-row button { font-size: 11px; padding: 6px 11px; border-radius: 6px; background: var(--blue); color: #fff; border: none; cursor: pointer; font-family: var(--font); font-weight: 600; white-space: nowrap; }

/* ── 메모 ── */
.memo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 7px; position: relative; }
.memo-hd { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.memo-proj-tag { font-size: 10px; padding: 1px 7px; border-radius: 4px; font-weight: 600; background: var(--blue-bg); color: var(--blue-txt); border: 1px solid var(--blue-bd); }
.memo-time { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.memo-body { font-size: 12px; color: var(--text2); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.memo-person-tab { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: var(--font); transition: all .12s; white-space: nowrap; }
.memo-person-tab.on { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ── 프로젝트 히스토리 ── */
.proj-history { display: none; border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; }
.proj-history.open { display: block; }
.history-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; align-items: flex-start; }
.history-item:last-child { border-bottom: none; }
.history-time { font-size: 10px; color: var(--text3); font-family: var(--mono); white-space: nowrap; min-width: 80px; }
.history-text { flex: 1; color: var(--text2); line-height: 1.45; word-break: break-word; }
.history-input-row { display: flex; gap: 6px; margin-top: 8px; }
.history-input-row input { flex: 1; font-size: 11px; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); outline: none; }
.history-input-row input:focus { border-color: var(--blue); }
.history-input-row button { font-size: 11px; padding: 5px 10px; border-radius: 6px; background: var(--blue); color: #fff; border: none; cursor: pointer; font-family: var(--font); font-weight: 600; }
.proj-toggle-btn { font-size: 10px; color: var(--blue-txt); background: var(--blue-bg); border: 1px solid var(--blue-bd); border-radius: 5px; padding: 2px 8px; cursor: pointer; font-family: var(--font); transition: background .12s; white-space: nowrap; }
.proj-toggle-btn:hover { background: var(--blue-bd); }


/* ── PIN 입력 화면 ── */
.pin-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 16px; padding: 24px;
}
.pin-overlay.open { display: flex; }
.pin-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.pin-sub { font-size: 11px; color: var(--text3); margin-bottom: 20px; }
.pin-av { width: 48px; height: 48px; border-radius: 50%; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.pin-dots { display: flex; gap: 10px; margin-bottom: 20px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border2); background: transparent; transition: background .15s; }
.pin-dot.filled { background: var(--blue); border-color: var(--blue); }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxZez_Y9CDqKlRcP5S3Sl9XlcHKue6rdg",
  authDomain: "calendar-64524.firebaseapp.com",
  databaseURL: "https://calendar-64524-default-rtdb.firebaseio.com",
  projectId: "calendar-64524",
  storageBucket: "calendar-64524.firebasestorage.app",
  messagingSenderId: "768034165757",
  appId: "1:768034165757:web:c89976603bc2a7a93f3f94"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const entriesRef = ref(db,'entries');
const projectsRef = ref(db,'projects');

let entries={}, projects={}, filterTag='전체', editId=null;
let projSortOrder='asc'; // 오름차순
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let viewDate=todayStr();


document.getElementById('inp-date').value = todayStr();
viewDate = todayStr();
setTimeout(updateViewDateLabel, 0);
// Firebase 로드 완료 후 initUserSelect 호출됨
// 보험: 1.5초 후에도 안 열리면 강제로 열기
setTimeout(()=>{
  if(!_userInitDone){ _userInitDone=true; initUserSelect(); }
}, 1500);

function todayStr(){ return new Date().toISOString().slice(0,10); }
function toMin(t){ const[h,m]=t.split(':').map(Number); return h*60+m; }
function fmtDur(min){ return min>0 ? Math.floor(min/60)+'h '+(min%60)+'m' : '—'; }

// ── 색상 ──
const COLORS=[['#dbeafe','#1e40af'],['#d1fae5','#065f46'],['#fef3c7','#92400e'],['#ede9fe','#4c1d95'],['#fce7f3','#831843'],['#ffedd5','#7c2d12']];
const PROJ_COLORS=['#2563eb','#16a34a','#d97706','#7c3aed','#dc2626','#0891b2','#ea580c','#65a30d'];
function getColor(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[Math.abs(h)]; }
function getProjColor(id){ const keys=Object.keys(projects); const i=keys.indexOf(id); return i>=0?PROJ_COLORS[i%PROJ_COLORS.length]:'#9ca3af'; }
function initials(n){ return n.slice(0,2); }

// ── Firebase 리스너 ──
onValue(entriesRef,(snap)=>{
  const newEntries=snap.val()||{};
  checkNewEntries(newEntries);
  entries=newEntries;
  render(); renderCal();
  if(document.getElementById('panel-stats').classList.contains('active')) renderStats();
});
onValue(projectsRef,(snap)=>{
  projects=snap.val()||{};
  updateProjSelects(); renderProjList();
  renderUserButtons(); updateMemoProj();
  if(!_userInitDone){ _userInitDone=true; initUserSelect(); }
});
let _userInitDone=false;

// ── 프로젝트 select 동기화 ──
function updateProjSelects(){
  const sorted = Object.entries(projects).sort((a,b)=>{
    const na=(a[1].name||'').localeCompare(b[1].name||'','ko');
    return na;
  });
  const opts=sorted.map(([id,p])=>`<option value="${id}">${p.name}</option>`).join('');
  ['inp-proj','edit-proj'].forEach(elId=>{
    const el=document.getElementById(elId);
    if(!el) return;
    const empty = elId==='inp-proj'?'<option value="">프로젝트</option>':'<option value="">없음</option>';
    el.innerHTML=empty+opts;
  });
}

// ── 업무 CRUD ──
window._submitEntry=window.submitEntry=function(){
  const saved=localStorage.getItem('currentUser');
  const nameEl=document.getElementById('inp-name');
  if(saved && !nameEl.value.trim()) nameEl.value=saved;
  const name=nameEl.value.trim();
  const tag=document.getElementById('inp-tag').value;
  const task=document.getElementById('inp-task').value.trim();
  const date=document.getElementById('inp-date').value||todayStr();
  const startTime=document.getElementById('inp-start').value;
  const endTime=document.getElementById('inp-end').value;
  const projectId=document.getElementById('inp-proj').value||'';
  if(!name){nameEl.focus();return;}
  if(!task){document.getElementById('inp-task').focus();return;}
  push(entriesRef,{name,tag,task,date,startTime,endTime,projectId,ts:Date.now()});
  document.getElementById('inp-task').value='';
  document.getElementById('inp-start').value='';
  document.getElementById('inp-end').value='';
  if(saved) setTimeout(()=>{ nameEl.value=saved; },100);
}
window._deleteEntry=window.deleteEntry=function(id){ if(!confirm('삭제하시겠습니까?')) return; remove(ref(db,'entries/'+id)); }
window._openEdit=window.openEdit=function(id){
  const e=entries[id]; if(!e) return;
  editId=id;
  document.getElementById('edit-name').value=e.name;
  document.getElementById('edit-tag').value=e.tag;
  document.getElementById('edit-date').value=e.date||todayStr();
  document.getElementById('edit-start').value=e.startTime||'';
  document.getElementById('edit-end').value=e.endTime||'';
  document.getElementById('edit-proj').value=e.projectId||'';
  document.getElementById('edit-task').value=e.task;
  document.getElementById('modal-bg').classList.add('open');
}
window._closeModal=window.closeModal=function(){ document.getElementById('modal-bg').classList.remove('open'); editId=null; }
window._saveEdit=window.saveEdit=function(){
  if(!editId){closeModal();return;}
  update(ref(db,'entries/'+editId),{
    name:document.getElementById('edit-name').value.trim()||entries[editId].name,
    tag:document.getElementById('edit-tag').value,
    date:document.getElementById('edit-date').value,
    startTime:document.getElementById('edit-start').value,
    endTime:document.getElementById('edit-end').value,
    projectId:document.getElementById('edit-proj').value||'',
    task:document.getElementById('edit-task').value.trim()||entries[editId].task,
    ts:entries[editId].ts
  });
  closeModal();
}

// ── 프로젝트 CRUD ──
window._addProject=window.addProject=function(){
  const code=document.getElementById('new-proj-code').value.trim();
  const name=document.getElementById('new-proj-name').value.trim();
  const client=document.getElementById('new-proj-client').value.trim();
  const design=document.getElementById('new-proj-design').value.trim();
  const eng=document.getElementById('new-proj-eng').value.trim();
  if(!name) return;
  push(projectsRef,{code,name,client,design,eng});
  ['new-proj-code','new-proj-name','new-proj-client','new-proj-design','new-proj-eng'].forEach(id=>{ document.getElementById(id).value=''; });
}
window._deleteProject=window.deleteProject=function(id){ if(!confirm('프로젝트를 삭제하시겠습니까?')) return; remove(ref(db,'projects/'+id)); }
window._startEditProj=window.startEditProj=function(id){
  document.getElementById('pinfo-'+id).style.display='none';
  document.getElementById('pedit-'+id).classList.add('open');
}
window._saveEditProj=window.saveEditProj=function(id){
  const name=document.getElementById('pe-name-'+id).value.trim();
  const code=document.getElementById('pe-code-'+id).value.trim();
  const client=document.getElementById('pe-client-'+id)?document.getElementById('pe-client-'+id).value.trim():'';
  const design=document.getElementById('pe-design-'+id).value.trim();
  const eng=document.getElementById('pe-eng-'+id).value.trim();
  if(name) update(ref(db,'projects/'+id),{name,code,client,design,eng});
  document.getElementById('pinfo-'+id).style.display='flex';
  document.getElementById('pedit-'+id).classList.remove('open');
}
function renderProjList(){
  const list=document.getElementById('proj-list');
  if(!list) return;
  let arr=Object.entries(projects);
  if(!arr.length){list.innerHTML='<div class="empty">등록된 프로젝트가 없습니다</div>';return;}
  // 프로젝트 코드 기준 정렬
  arr.sort((a,b)=>{
    const ca=(a[1].code||'').trim().toLowerCase();
    const cb=(b[1].code||'').trim().toLowerCase();
    // 숫자 포함 코드 자연 정렬
    const cmp=ca.localeCompare(cb,undefined,{numeric:true,sensitivity:'base'});
    return projSortOrder==='asc'?cmp:-cmp;
  });
  list.innerHTML=arr.map(([id,p],i)=>{
    const color=PROJ_COLORS[i%PROJ_COLORS.length];
    const cnt=Object.values(entries).filter(e=>e.projectId===id).length;
    return `<div class="proj-item">
      <div class="proj-item-top">
        <div class="proj-dot" style="background:${color}"></div>
        <div class="proj-info" id="pinfo-${id}" style="display:flex">
          ${p.code?`<span class="proj-tag-badge" style="background:#f3f4f6;color:#374151;border-color:#d1d5db">${p.code}</span>`:''}
          ${p.client?`<span class="proj-tag-badge" style="background:var(--green-bg);color:var(--green-txt);border-color:var(--green-bd)">🏗 ${p.client}</span>`:''}
          <span style="font-size:12px;font-weight:700;color:var(--text)">${p.name}</span>
          ${p.design?`<span class="proj-tag-badge" style="background:var(--blue-bg);color:var(--blue-txt);border-color:var(--blue-bd)">디자인담당 ${p.design}</span>`:''}
          ${p.eng?`<span class="proj-tag-badge" style="background:var(--purple-bg);color:var(--purple-txt);border-color:var(--purple-bd)">설계담당 ${p.eng}</span>`:''}
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${cnt}건</span>
        </div>
        <button class="proj-toggle-btn" onclick="toggleHistory('${id}')">📋 이슈/히스토리</button>
        <button class="btn-ghost-sm" onclick="startEditProj('${id}')">✏ 수정</button>
        <button class="act-btn" onclick="deleteProject('${id}')">✕</button>
      </div>
      <div class="proj-edit-row" id="pedit-${id}">
        <input id="pe-code-${id}" type="text" value="${p.code||''}" placeholder="코드" style="width:62px" class="inp-sm"/>
        <input id="pe-client-${id}" type="text" value="${p.client||''}" placeholder="건설사" style="width:68px" class="inp-sm"/>
        <input id="pe-name-${id}" type="text" value="${p.name}" placeholder="프로젝트명" style="flex:1;min-width:70px" class="inp-sm"/>
        <input id="pe-design-${id}" type="text" value="${p.design||''}" placeholder="디자인담당" style="width:68px" class="inp-sm"/>
        <input id="pe-eng-${id}" type="text" value="${p.eng||''}" placeholder="설계담당" style="width:68px" class="inp-sm"/>
        <button class="btn-add" style="padding:5px 9px;font-size:11px" onclick="saveEditProj('${id}')">저장</button>
      </div>
      <div class="proj-history" id="hist-${id}">
        <div id="hist-list-${id}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── 날짜 네비 ──
window._changeViewDate=window.changeViewDate=function(delta){
  const d=new Date(viewDate); d.setDate(d.getDate()+delta);
  viewDate=d.toISOString().slice(0,10);
  updateViewDateLabel(); render();
}
window._goToViewToday=window.goToViewToday=function(){
  viewDate=todayStr(); updateViewDateLabel(); render();
}
function updateViewDateLabel(){
  const td=todayStr();
  const label=viewDate===td?'오늘':viewDate.slice(5).replace('-','/');
  const el=document.getElementById('view-date-lbl');
  el.textContent=label;
}

// ── 렌더 ──
function render(){
  const td=viewDate;
  const curUser=localStorage.getItem('currentUser')||'';
  const all=Object.entries(entries).map(([id,e])=>({...e,id}));
  const todayAll=all.filter(e=>!e.date||e.date===td);
  const filtered=filterTag==='전체'?todayAll:todayAll.filter(e=>e.tag===filterTag);
  filtered.sort((a,b)=>(b.ts||0)-(a.ts||0));
  document.getElementById('cnt').textContent=todayAll.length;
  const list=document.getElementById('board-list');
  if(!filtered.length){list.innerHTML=`<div class="empty">${viewDate===todayStr()?'오늘':'해당 날짜에'} 등록된 업무가 없습니다</div>`;return;}
  list.innerHTML=filtered.map(e=>{
    const[bg,fg]=getColor(e.name);
    const proj=e.projectId&&projects[e.projectId];
    const pc=e.projectId?getProjColor(e.projectId):null;
    const projBadge=proj?`<div class="proj-badge" style="background:${pc}18;color:${pc};border-color:${pc}44">${proj.name}</div>`:'';
    const timeStr=e.startTime&&e.endTime?e.startTime+' ~ '+e.endTime:e.startTime?e.startTime+' 시작':'';
    const canEdit = e.name===curUser || currentIsAdmin();
    return `<div class="card">
      ${canEdit?`<div class="card-actions">
        <button class="act-btn" onclick="openEdit('${e.id}')">✏</button>
        <button class="act-btn" onclick="deleteEntry('${e.id}')">✕</button>
      </div>`:''}
      <div class="card-hd">
        <div class="av" style="background:${bg};color:${fg}">${initials(e.name)}</div>
        <div class="meta">
          <div class="meta-name">${e.name}</div>
          ${timeStr?`<div class="meta-time">${timeStr}</div>`:''}
        </div>
        <span class="tag t${e.tag.replace(/ /g,'')}">${e.tag}</span>
      </div>
      ${projBadge}
      <div class="card-body">${e.task.replace(/</g,'&lt;')}</div>
    </div>`;
  }).join('');
}

// ── 통계 ──



function renderStats(){
  const all=Object.values(entries);
  const curUser=localStorage.getItem('currentUser')||'';
  // 통계에서 '사내 행사 및 기타' 프로젝트 제외
  const STAT_EXCLUDE_PROJ = '사내 행사 및 기타';
  function isExcludedFromStats(e){
    if(!e.projectId) return false;
    const p = projects[e.projectId];
    return p && p.name === STAT_EXCLUDE_PROJ;
  }

  // ── 사람별 ──
  const personMap={};
  all.forEach(e=>{
    if(isExcludedFromStats(e)) return;
    if(!e.name) return;
    if(!personMap[e.name]) personMap[e.name]={total:0,'cnt작업중':0,'cnt작업완료':0,'cnt1차송부':0,'cnt납품':0,'cnt작업예정':0,projects:{},totalMin:0};
    const pm=personMap[e.name]; pm.total++;
    const tagKey='cnt'+e.tag; if(tagKey in pm) pm[tagKey]++;
    const projName=e.projectId&&projects[e.projectId]?projects[e.projectId].name:'미지정';
    if(!pm.projects[projName]) pm.projects[projName]={count:0,dur:0};
    pm.projects[projName].count++;
    if(e.startTime&&e.endTime){
      const dur=Math.max(0,toMin(e.endTime)-toMin(e.startTime));
      pm.projects[projName].dur+=dur; pm.totalMin+=dur;
    }
  });
  const personEl=document.getElementById('stats-person');
  const pArr=Object.entries(personMap).sort((a,b)=>b[1].total-a[1].total);
  if(!pArr.length){personEl.innerHTML='<div class="empty">데이터가 없습니다</div>';}
  else personEl.innerHTML=pArr.map(([name,pm],idx)=>{
    const[bg,fg]=getColor(name);
    const projRows=Object.entries(pm.projects).map(([pname,pd])=>`
      <div class="proj-row">
        <span class="proj-row-name">${pname}</span>
        <span class="proj-row-cnt">${pd.count}건</span>
        <span class="proj-row-time">⏱ ${fmtDur(pd.dur)}</span>
      </div>`).join('');
    const badgeRow=`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;">
      ${['작업중','작업완료','1차송부','납품','작업예정'].map(t=>`
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <span style="font-size:8px;color:var(--text3);">${t}</span>
          <span class="tag t${t}" style="font-size:9px;">${pm['cnt'+t]}</span>
        </div>`).join('')}
    </div>`;
    return `<div>
      <div class="acc-header" onclick="toggleAcc('p${idx}')">
        <div class="av" style="background:${bg};color:${fg};width:24px;height:24px;font-size:10px;flex-shrink:0">${initials(name)}</div>
        <span class="acc-title">${name}</span>
        <span class="acc-sub">${pm.total}건 · ${fmtDur(pm.totalMin)}</span>
        <span class="acc-arrow">▶</span>
      </div>
      <div class="acc-body" id="acc-p${idx}">
        ${badgeRow}
        <div style="font-size:10px;font-weight:700;color:var(--text3);margin:6px 0 3px">프로젝트별</div>
        ${projRows}
      </div>
    </div>`;
  }).join('');

  // ── 프로젝트별 ──
  const projMap={};
  all.forEach(e=>{
    if(isExcludedFromStats(e)) return;
    const pid=e.projectId||'__none__';
    const pname=e.projectId&&projects[e.projectId]?projects[e.projectId].name:'미지정';
    if(!projMap[pid]) projMap[pid]={name:pname,persons:{},totalMin:0,count:0};
    const pm=projMap[pid]; pm.count++;
    if(!pm.persons[e.name]) pm.persons[e.name]={count:0,dur:0};
    pm.persons[e.name].count++;
    if(e.startTime&&e.endTime){
      const dur=Math.max(0,toMin(e.endTime)-toMin(e.startTime));
      pm.persons[e.name].dur+=dur; pm.totalMin+=dur;
    }
  });
  const projEl=document.getElementById('stats-proj');
  if(projEl) projEl.style.display='block';
  const projArr=Object.entries(projMap).sort((a,b)=>b[1].totalMin-a[1].totalMin);
  if(!projArr.length){projEl.innerHTML='<div class="empty">데이터가 없습니다</div>';}
  else projEl.innerHTML=projArr.map(([pid,pm],idx)=>{
    const color=pid==='__none__'?'#9ca3af':PROJ_COLORS[Object.keys(projects).indexOf(pid)%PROJ_COLORS.length]||'#9ca3af';
    const personRows=Object.entries(pm.persons).sort((a,b)=>b[1].dur-a[1].dur).map(([name,pd])=>`
      <div class="proj-row">
        <span class="proj-row-name">${name}</span>
        <span class="proj-row-cnt">${pd.count}건</span>
        <span class="proj-row-time">⏱ ${fmtDur(pd.dur)}</span>
      </div>`).join('');
    return `<div>
      <div class="acc-header" onclick="toggleAcc('pj${idx}')">
        <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <span class="acc-title">${pm.name}</span>
        <span class="acc-sub">${pm.count}건 · ${fmtDur(pm.totalMin)}</span>
        <span class="acc-arrow">▶</span>
      </div>
      <div class="acc-body" id="acc-pj${idx}">
        <div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:3px">담당자별</div>
        ${personRows}
      </div>
    </div>`;
  }).join('');

  // ── 월별 ──
  const monthMap={};
  all.forEach(e=>{
    if(!e.date) return;
    if(isExcludedFromStats(e)) return;
    const ym=e.date.slice(0,7);
    if(!monthMap[ym]) monthMap[ym]={};
    const mData=monthMap[ym];
    if(!mData[e.name]) mData[e.name]={projects:{},days:new Set(),totalMin:0};
    const pd=mData[e.name];
    pd.days.add(e.date);
    const pname=e.projectId&&projects[e.projectId]?projects[e.projectId].name:'미지정';
    if(!pd.projects[pname]) pd.projects[pname]=0;
    if(e.startTime&&e.endTime){
      const dur=Math.max(0,toMin(e.endTime)-toMin(e.startTime));
      pd.projects[pname]+=dur; pd.totalMin+=dur;
    } else { pd.projects[pname]+=0; }
  });
  const monthEl=document.getElementById('stats-month');
  const monthArr=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!monthArr.length){monthEl.innerHTML='<div class="empty">데이터가 없습니다</div>';}
  else monthEl.innerHTML=monthArr.map(([ym,persons],midx)=>{
    const[y,m]=ym.split('-');
    const totalPeople=Object.keys(persons).length;
    const personItems=Object.entries(persons).map(([name,pd],pidx)=>{
      const[bg,fg]=getColor(name);
      const projRows=Object.entries(pd.projects).map(([pname,dur])=>`
        <div class="proj-row">
          <span class="proj-row-name">${pname}</span>
          <span class="proj-row-cnt">${pd.days.size}일</span>
          <span class="proj-row-time">⏱ ${fmtDur(dur)}</span>
        </div>`).join('');
      return `<div>
        <div class="acc-sub-header" onclick="toggleAcc('mo${midx}p${pidx}')">
          <div class="av" style="background:${bg};color:${fg};width:20px;height:20px;font-size:9px;flex-shrink:0">${initials(name)}</div>
          <span class="acc-sub-title">${name}</span>
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${pd.days.size}일 · ${fmtDur(pd.totalMin)}</span>
          <span class="acc-arrow" style="font-size:9px">▶</span>
        </div>
        <div class="acc-sub-body" id="acc-mo${midx}p${pidx}">
          ${projRows}
        </div>
      </div>`;
    }).join('');
    return `<div>
      <div class="acc-header" onclick="toggleAcc('mo${midx}')">
        <span class="acc-title">${parseInt(y)}년 ${parseInt(m)}월</span>
        <span class="acc-sub">${totalPeople}명</span>
        <span class="acc-arrow">▶</span>
      </div>
      <div class="acc-body" id="acc-mo${midx}">
        ${personItems}
      </div>
    </div>`;
  }).join('');
}


// ── 달력 ──
function renderCal(){
  const y=calYear, m=calMonth;
  document.getElementById('cal-title').textContent=`${y}년 ${m+1}월`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const todayD=new Date();
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const all=Object.values(entries);
  for(let i=0;i<first;i++){const pd=new Date(y,m,-(first-1-i));html+=`<div class="cal-cell other-month"><div class="cal-num">${pd.getDate()}</div></div>`;}
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=todayD.getFullYear()===y&&todayD.getMonth()===m&&todayD.getDate()===d;
    const de=all.filter(e=>e.date===ds);
    const dots=de.slice(0,2).map(e=>`<div class="cal-dot t${e.tag.replace(/ /g,'')}">${e.name}</div>`).join('');
    const more=de.length>2?`<div style="font-size:9px;color:var(--text3)">+${de.length-2}</div>`:'';
    html+=`<div class="cal-cell${isToday?' today':''}" onclick="showCalDetail('${ds}')"><div class="cal-num">${d}</div><div class="cal-dots">${dots}${more}</div></div>`;
  }
  const trail=(7-((first+days)%7))%7;
  for(let i=1;i<=trail;i++) html+=`<div class="cal-cell other-month"><div class="cal-num">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;
}

window._showCalDetail=window.showCalDetail=function(ds){
  const all=Object.entries(entries).map(([id,e])=>({...e,id}));
  const de=all.filter(e=>e.date===ds);
  const det=document.getElementById('cal-detail');
  if(!de.length){det.style.display='none';return;}
  const[y,mo,d]=ds.split('-');
  document.getElementById('cal-detail-title').textContent=`${parseInt(mo)}월 ${parseInt(d)}일 (${de.length}건)`;
  document.getElementById('cal-detail-body').innerHTML=de.map(e=>{
    const proj=e.projectId&&projects[e.projectId];
    const timeStr=e.startTime&&e.endTime?e.startTime+' ~ '+e.endTime:e.startTime?e.startTime+' 시작':'';
    return `<div class="cal-entry">
      <div class="cal-entry-info">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px">
          <span class="cal-entry-name">${e.name}</span>
          <span class="tag t${e.tag.replace(/ /g,'')}" style="font-size:9px">${e.tag}</span>
          ${proj?`<span style="font-size:9px;color:var(--blue-txt);background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:3px;padding:0 4px">${proj.name}</span>`:''}
        </div>
        ${timeStr?`<div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:2px">⏱ ${timeStr}</div>`:''}
        <div class="cal-entry-body">${e.task.replace(/</g,'&lt;')}</div>
      </div>
      <div class="cal-entry-acts">
        ${(e.name===localStorage.getItem('currentUser')||currentIsAdmin())?`
        <button class="act-btn" onclick="openEdit('${e.id}')">✏</button>
        <button class="act-btn" onclick="deleteEntry('${e.id}');showCalDetail('${ds}')">✕</button>`:''}
      </div>
    </div>`;
  }).join('');
  det.style.display='block';
}

window._goToToday=window.goToToday=function(){
  calYear=new Date().getFullYear(); calMonth=new Date().getMonth();
  renderCal(); showCalDetail(todayStr());
}
window._changeMonth=window.changeMonth=function(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}
window._setFilter=window.setFilter=function(f,btn){
  filterTag=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); render();
}
window._switchTab=window.switchTab=function(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='stats') renderStats();
  if(id==='projects') renderProjList();
  if(id==='memo'){ updateMemoProj(); renderMemoTabs(); }
}

window._filterProjList=window.filterProjList=function(){
  const q = document.getElementById('proj-search').value.trim().toLowerCase();
  document.querySelectorAll('.proj-item').forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

// ── 사용자 선택 ──
function getMemberList(){
  return JSON.parse(localStorage.getItem('memberList')||'["방준수","김유빈","이지훈","박서연","최민준"]');
}
function saveMemberList(arr){
  localStorage.setItem('memberList', JSON.stringify(arr));
}

function initUserSelect(){
  const saved = localStorage.getItem('currentUser');
  if(saved){ applyUser(saved); return; }
  renderUserButtons();
  const _ov2=document.getElementById('user-select-overlay'); _ov2.classList.add('open'); _ov2.style.display='flex';
  // widget-shell always visible
}

function renderUserButtons(){
  const list = document.getElementById('user-btn-list');
  const members = getMemberList();
  // 일반 멤버 버튼
  let html = members.map((name,i)=>{
    const [bg,fg] = COLORS[i%COLORS.length];
    return `<div class="user-btn-row">
      <button class="user-btn" onclick="selectUser('${name}')">
        <div class="user-av" style="background:${bg};color:${fg}">${name.slice(0,2)}</div>
        <span class="user-btn-name">${name}</span>
      </button>
      <span class="user-btn-acts">
        <button class="user-btn-edit" onclick="editMember(${i},'${name}')">✏</button>
        <button class="user-btn-del" onclick="deleteMember(${i})">✕</button>
      </span>
    </div>`;
  }).join('');
  // 어드민 계정 버튼 (항상 하단에 표시)
  html += `<div class="user-btn-row" style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px;">
    <button class="user-btn" onclick="selectUser('어드민')" style="border-color:var(--amber-bd);background:var(--amber-bg);">
      <div class="user-av" style="background:var(--amber-bg);color:var(--amber-txt);">관</div>
      <span class="user-btn-name" style="color:var(--amber-txt);">어드민</span>
      <span style="font-size:9px;color:var(--amber-txt);margin-left:auto;">🔐</span>
    </button>
  </div>`;
  list.innerHTML = html;
}

window._addMember=window.addMember=function(){
  const inp = document.getElementById('user-new-input');
  const name = inp.value.trim();
  if(!name) return;
  const members = getMemberList();
  if(members.includes(name)){ inp.value=''; return; }
  members.push(name);
  saveMemberList(members);
  inp.value='';
  renderUserButtons();
}

// editMember는 아래 새 버전으로 대체됨

window._deleteMember=window.deleteMember=function(idx){
  if(!confirm('멤버를 삭제하시겠습니까?')) return;
  const members = getMemberList();
  members.splice(idx,1);
  saveMemberList(members);
  renderUserButtons();
}

window._selectUser=window.selectUser=function(name){
  if(!name||!name.trim()) return;
  localStorage.setItem('currentUser', name.trim());
  applyUser(name.trim());
}

function applyUser(name){
  const _ov3=document.getElementById('user-select-overlay'); _ov3.classList.remove('open'); _ov3.style.display='';
  const ov=document.getElementById('user-select-overlay'); ov.classList.remove('open'); ov.style.display='';
  const inp = document.getElementById('inp-name');
  if(inp) inp.value = isAdminUser(name)?'':name;
  const lbl = document.getElementById('current-user-lbl');
  if(lbl){
    lbl.textContent = name;
    lbl.style.background = isAdminUser(name)?'var(--amber-bg)':'var(--blue-bg)';
    lbl.style.color = isAdminUser(name)?'var(--amber-txt)':'var(--blue-txt)';
    lbl.style.borderColor = isAdminUser(name)?'var(--amber-bd)':'var(--blue-bd)';
  }
  // 메모 탭 현재 사용자 탭 활성화
  renderMemoTabs();
}

window._changeUser=window.changeUser=function(){
  localStorage.removeItem('currentUser');
  const ov=document.getElementById('user-select-overlay'); ov.classList.add('open'); ov.style.display='flex';
  renderUserButtons();
}

// 등록 후 이름 유지 (submitEntry 직접 패치 대신 훅 방식)
window._afterSubmitHook = function(){
  const saved = localStorage.getItem('currentUser');
  if(saved) setTimeout(()=>{ document.getElementById('inp-name').value=saved; },100);
};


// ── 메모 ──
const memosRef = ref(db,'memos');
const historyRef = ref(db,'history');
let memos={}, memoPersonFilter='전체';

onValue(memosRef,(snap)=>{ memos=snap.val()||{}; renderMemoList(); });
onValue(historyRef,(snap)=>{
  historyData=snap.val()||{};
  // 열려있는 히스토리 패널 자동 갱신
  Object.keys(historyData).forEach(projId=>{
    const el = document.getElementById('hist-'+projId);
    if(el && el.classList.contains('open')) renderHistoryList(projId);
  });
});

function updateMemoProj(){
  const sel = document.getElementById('memo-proj-sel');
  if(!sel) return;
  const opts = Object.entries(projects).map(([id,p])=>`<option value="${id}">${p.name}</option>`).join('');
  sel.innerHTML = '<option value="">프로젝트 (선택)</option>' + opts;
}

window._submitMemo=window.submitMemo=function(){
  const text = document.getElementById('memo-text').value.trim();
  const projId = document.getElementById('memo-proj-sel').value||'';
  const author = localStorage.getItem('currentUser')||'익명';
  if(!text) return;
  const now = new Date();
  push(memosRef,{
    author, text, projId,
    date: now.toISOString().slice(0,10),
    time: now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    ts: now.getTime()
  });
  document.getElementById('memo-text').value='';
}

window._deleteMemo=window.deleteMemo=function(id){
  const curUser=localStorage.getItem('currentUser')||'';
  const memo=memos[id];
  if(memo && memo.author !== curUser && !currentIsAdmin()){
    alert('본인이 작성한 메모만 삭제할 수 있어요.');
    return;
  } if(!confirm('메모를 삭제하시겠습니까?')) return; remove(ref(db,'memos/'+id)); }

function renderMemoTabs(){
  const tabEl = document.getElementById('memo-person-tabs');
  if(!tabEl) return;
  const members = getMemberList();
  const cur = localStorage.getItem('currentUser');
  // 현재 사용자를 기본 필터로
  if(cur && memoPersonFilter==='전체') memoPersonFilter = cur;
  tabEl.innerHTML = members.map(name=>`
    <button class="memo-person-tab ${memoPersonFilter===name?'on':''}" onclick="setMemoFilter('${name}')">${name}</button>
  `).join('');
  renderMemoList();
}

window._setMemoFilter=window.setMemoFilter=function(name){
  memoPersonFilter = name;
  renderMemoTabs();
}

function renderMemoList(){
  const el = document.getElementById('memo-list');
  if(!el) return;
  const all = Object.entries(memos).map(([id,m])=>({...m,id}));
  const filtered = all.filter(m=>m.author===memoPersonFilter);
  filtered.sort((a,b)=>(b.ts||0)-(a.ts||0));

// ── PIN 시스템 ──
let _pinBuffer = '';
let _pinTargetUser = '';
let _pinMode = 'login'; // 'login' | 'set' | 'change_old' | 'change_new'
let _pinOldVerified = '';

function getPinData(){
  return JSON.parse(localStorage.getItem('pinData')||'{}');
}
function savePinData(data){
  localStorage.setItem('pinData', JSON.stringify(data));
}

// 사용자 선택 → PIN 있으면 입력, 없으면 바로 로그인
window._selectUser=window.selectUser=function(name){
  if(!name||!name.trim()) return;
  if(name === '어드민'){
    // 어드민은 ADMIN_PIN으로 인증
    showAdminLoginOverlay();
    return;
  }
  const pinData = getPinData();
  if(pinData[name]){
    showPinOverlay(name, 'login');
  } else {
    localStorage.setItem('currentUser', name.trim());
    applyUser(name.trim());
    setTimeout(()=>{
      if(confirm('"'+name+'" PIN이 설정되어 있지 않아요.\nPIN을 지금 설정하시겠어요?')){
        showPinOverlay(name, 'set');
      }
    }, 300);
  }
}

function showPinOverlay(name, mode){
  _pinBuffer = '';
  _pinTargetUser = name;
  _pinMode = mode;
  _pinOldVerified = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';

  const members = getMemberList();
  const [bg,fg] = COLORS[members.indexOf(name)%COLORS.length]||COLORS[0];
  const av = document.getElementById('pin-av');
  av.style.background = bg; av.style.color = fg;
  av.textContent = name.slice(0,2);

  const titles = {
    login: name,
    set: 'PIN 설정',
    change_old: 'PIN 변경',
    change_new: '새 PIN 입력'
  };
  const subs = {
    login: '4자리 PIN을 입력하세요',
    set: '사용할 4자리 PIN을 입력하세요',
    change_old: '현재 PIN을 먼저 입력하세요',
    change_new: '새로운 4자리 PIN을 입력하세요'
  };
  document.getElementById('pin-title').textContent = titles[mode]||name;
  document.getElementById('pin-sub').textContent = subs[mode]||'';

  const uov = document.getElementById('user-select-overlay');
  uov.classList.remove('open'); uov.style.display='';
  const pov = document.getElementById('pin-overlay');
  pov.classList.add('open'); pov.style.display='flex';
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(d) d.classList.toggle('filled', i < _pinBuffer.length);
  }
}

window._pinInput=window.pinInput=function(num){
  if(_pinBuffer.length >= 4) return;
  _pinBuffer += num;
  updatePinDots();
  if(_pinBuffer.length === 4) setTimeout(()=> checkPin(), 150);
}

window._pinDelete=window.pinDelete=function(){
  _pinBuffer = _pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

window._pinBack=window.pinBack=function(){
  _pinBuffer='';
  const pov = document.getElementById('pin-overlay');
  pov.classList.remove('open'); pov.style.display='';
  if(_pinMode==='change_old'||_pinMode==='change_new'){
    // 변경 중이면 그냥 닫기
    return;
  }
  const uov = document.getElementById('user-select-overlay');
  uov.classList.add('open'); uov.style.display='flex';
  renderUserButtons();
}

function checkPin(){
  const pinData = getPinData();
  if(_pinMode === 'set'){
    pinData[_pinTargetUser] = _pinBuffer;
    savePinData(pinData);
    document.getElementById('pin-overlay').classList.remove('open');
    document.getElementById('pin-overlay').style.display='';
    _pinBuffer='';
    if(localStorage.getItem('currentUser') !== _pinTargetUser){
      localStorage.setItem('currentUser', _pinTargetUser);
      applyUser(_pinTargetUser);
    }
    return;
  }
  if(_pinMode === 'change_old'){
    if(pinData[_pinTargetUser] === _pinBuffer){
      _pinOldVerified = _pinBuffer;
      _pinBuffer = '';
      updatePinDots();
      _pinMode = 'change_new';
      document.getElementById('pin-title').textContent = '새 PIN 입력';
      document.getElementById('pin-sub').textContent = '새로운 4자리 PIN을 입력하세요';
      document.getElementById('pin-error').textContent = '';
    } else {
      document.getElementById('pin-error').textContent = '❌ 현재 PIN이 틀렸어요.';
      _pinBuffer=''; updatePinDots();
    }
    return;
  }
  if(_pinMode === 'change_new'){
    pinData[_pinTargetUser] = _pinBuffer;
    savePinData(pinData);
    document.getElementById('pin-overlay').classList.remove('open');
    document.getElementById('pin-overlay').style.display='';
    _pinBuffer='';
    alert('PIN이 변경되었어요!');
    return;
  }
  // login
  if(pinData[_pinTargetUser] === _pinBuffer){
    document.getElementById('pin-overlay').classList.remove('open');
    document.getElementById('pin-overlay').style.display='';
    localStorage.setItem('currentUser', _pinTargetUser);
    applyUser(_pinTargetUser);
    _pinBuffer='';
  } else {
    document.getElementById('pin-error').textContent = '❌ PIN이 틀렸어요. 다시 입력하세요.';
    _pinBuffer=''; updatePinDots();
  }
}

document.addEventListener('keydown', function(e){
  const adminPinVisible = document.getElementById('admin-pin-overlay').style.display==='flex';
  const adminEditVisible = document.getElementById('admin-edit-overlay').style.display==='flex';
  const pinVisible = document.getElementById('pin-overlay').classList.contains('open');

  if(nameEditVisible){
    if(e.key==='Enter') saveNameEdit();
    if(e.key==='Escape') closeNameEdit();
    return;
  }
  if(adminPinVisible){
    if(e.key>='0'&&e.key<='9') adminPinInput(e.key);
    if(e.key==='Backspace') adminPinDel();
    if(e.key==='Escape') closeAdminPinOverlay();
    return;
  }
  if(adminEditVisible){
    if(e.key>='0'&&e.key<='9') adminEditInput(e.key);
    if(e.key==='Backspace') adminEditDel();
    if(e.key==='Escape') closeAdminEdit();
    return;
  }
  const alVisible = document.getElementById('admin-login-overlay').style.display==='flex';
  if(alVisible){ if(e.key>='0'&&e.key<='9') alInput(e.key); if(e.key==='Backspace') alDel(); if(e.key==='Escape') closeAdminLoginOverlay(); return; }
  const cpOldVisible = document.getElementById('change-pin-old-overlay').style.display==='flex';
  const cpNewVisible = document.getElementById('change-pin-new-overlay').style.display==='flex';
  if(cpOldVisible){
    if(e.key>='0'&&e.key<='9') cpInput(e.key);
    if(e.key==='Backspace') cpDel();
    if(e.key==='Escape') backToChangePinSelect();
    return;
  }
  if(cpNewVisible){
    if(e.key>='0'&&e.key<='9') cpNewInput(e.key);
    if(e.key==='Backspace') cpNewDel();
    if(e.key==='Escape') backToOldPin();
    return;
  }
  if(pinVisible){
    if(e.key>='0'&&e.key<='9') pinInput(e.key);
    if(e.key==='Backspace') pinDelete();
    if(e.key==='Escape') pinBack();
    return;
  }
});

function updateCpDots(type){
  const buf = type==='old'?_cpOldBuf:_cpNewBuf;
  const prefix = type==='old'?'cpd':'cpn';
  for(let i=0;i<4;i++){
    const d=document.getElementById(prefix+i);
    if(d){d.style.background=i<buf.length?'var(--blue)':'transparent';d.style.borderColor=i<buf.length?'var(--blue)':'var(--border2)';}
  }
}

window.cpInput = function(n){
  if(_cpOldBuf.length>=4) return;

      if(pinData[_cpTarget]===_cpOldBuf){
        document.getElementById('change-pin-old-overlay').style.display='none';

        document.getElementById('cp-new-err').textContent='';

}

let _prevEntryKeys = null;
let _prevHistorySnap = {};
let _notifyEnabled = localStorage.getItem('notifyEnabled') !== 'false'; // 기본 ON

function updateNotifyBtn(){
  const btn = document.getElementById('notify-toggle-btn');
  if(!btn) return;
  btn.textContent = _notifyEnabled ? '🔔' : '🔕';
  btn.style.opacity = _notifyEnabled ? '1' : '0.4';
  btn.title = _notifyEnabled ? '알림 켜짐 (클릭하면 끔)' : '알림 꺼짐 (클릭하면 켬)';
}

window.toggleNotify = function(){
  _notifyEnabled = !_notifyEnabled;
  localStorage.setItem('notifyEnabled', _notifyEnabled);
  updateNotifyBtn();
}

function sendNotify(title, body){
  if(!_notifyEnabled) return;
  if(window.electronAPI && window.electronAPI.notify){
    window.electronAPI.notify(title, body);
  }
}

// 업무 새 글 감지
function checkNewEntries(newEntries){
  const curUser = localStorage.getItem('currentUser')||'';
  const newKeys = Object.keys(newEntries);
  if(_prevEntryKeys === null){ _prevEntryKeys = new Set(newKeys); return; }
  newKeys.forEach(k=>{
    if(!_prevEntryKeys.has(k)){
      const e = newEntries[k];
      if(e.name !== curUser){
        const projName = e.projectId&&projects[e.projectId]?` [${projects[e.projectId].name}]`:'';
        sendNotify(`📋 ${e.name}님이 업무를 등록했어요${projName}`, e.task?e.task.slice(0,60):'');
      }
    }
  });
  _prevEntryKeys = new Set(newKeys);
}

// 이슈/히스토리 새 글 감지
function checkNewHistory(projId, newItems){
  const curUser = localStorage.getItem('currentUser')||'';
  const prevKeys = _prevHistorySnap[projId] || null;
  const newKeys = Object.keys(newItems||{});
  if(prevKeys === null){ _prevHistorySnap[projId] = new Set(newKeys); return; }
  newKeys.forEach(k=>{
    if(!prevKeys.has(k)){
      const h = newItems[k];
      if(h.author !== curUser){
        const projName = projects[projId]?projects[projId].name:'프로젝트';
        sendNotify(`💬 ${h.author}님이 이슈를 등록했어요 [${projName}]`, h.text?h.text.slice(0,60):'');
      }
    }
  });
  _prevHistorySnap[projId] = new Set(newKeys);
}

// ── 위젯 크기 저장 (Electron 환경 외에도 동작) ──
(function(){
  try {
    const saved = localStorage.getItem('widgetSize');
    if(saved){ const {w,h}=JSON.parse(saved); if(w&&h){ document.body.style.width=w+'px'; document.body.style.height=h+'px'; } }
    const ro=new ResizeObserver(entries=>{
      for(const entry of entries){
        const w=Math.round(entry.contentRect.width);
        const h=Math.round(entry.contentRect.height);
        if(w>100&&h>100) localStorage.setItem('widgetSize',JSON.stringify({w,h}));
      }
    });
    ro.observe(document.getElementById('widget-shell'));
  } catch(e){}
})();
