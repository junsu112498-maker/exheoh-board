r { color:var(--text3); }\n.send-btn { width:42px; height:42px; border-radius:50%; background:var(--accent); color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }\n.send-btn svg { width:17px; height:17px; }\n.send-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 4px 14px rgba(91,139,245,.4); }\n.send-btn:disabled { opacity:.35; cursor:not-allowed; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"titlebar\">\n  <div class=\"mark\"><\u002Fdiv>\n  <div class=\"titlebar-info\">\n    <div class=\"titlebar-name\">JARVIS<\u002Fdiv>\n    <div class=\"titlebar-status\">\n      <span class=\"status-dot\" id=\"status-dot\"><\u002Fspan>\n      <span id=\"status-text\">연결 확인 중...<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <button class=\"titlebar-close\" id=\"close-btn\" aria-label=\"닫기\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M5 5l14 14M19 5L5 19\"><\u002Fpath><\u002Fsvg>\n  <\u002Fbutton>\n<\u002Fdiv>\n<div class=\"welcome\" id=\"welcome-screen\">\n  <div class=\"mark\"><\u002Fdiv>\n  <h2>안녕하세요<\u002Fh2>\n  <p>저는 JARVIS예요.<br>업무 등록, 팀 현황, 프로젝트 확인<br>무엇이든 물어보세요.<\u002Fp>\n  <div class=\"welcome-btns\">\n    <button class=\"welcome-btn\" id=\"q1\">오늘 팀 업무 요약<\u002Fbutton>\n    <button class=\"welcome-btn\" id=\"q2\">납품 현황 확인<\u002Fbutton>\n    <button class=\"welcome-btn\" id=\"q3\">이번주 내 업무<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"messages\" id=\"messages\" style=\"display:none;\"><\u002Fdiv>\n<div class=\"input-row\">\n  <input class=\"input\" id=\"input\" placeholder=\"무엇이든 물어보세요...\">\n  <button class=\"send-btn\" id=\"send-btn\" aria-label=\"전송\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n  <\u002Fbutton>\n<\u002Fdiv>\n<script>\nvar OLLAMA_URL = 'http://192.168.1.55:11434';\nvar MODEL = 'llama3.1:latest';\nvar FB_URL = 'https://calendar-64524-default-rtdb.firebaseio.com';\nvar fbEntries = {};\nvar fbProjects = {};\nvar isTyping = false;\n\ndocument.getElementById('close-btn').onclick = function() {\n  if (window.electronAPI && window.electronAPI.closeAIWindow) {\n    window.electronAPI.closeAIWindow();\n  } else {\n    window.close();\n  }\n};\ndocument.getElementById('send-btn').onclick = function() { sendMsg(); };\ndocument.getElementById('input').addEventListener('keydown', function(e) {\n  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }\n});\ndocument.getElementById('q1').onclick = function() { quickSend('오늘 우리팀 업무 요약해줘'); };\ndocument.getElementById('q2').onclick = function() { quickSend('납품 임박한 프로젝트 알려줘'); };\ndocument.getElementById('q3').onclick = function() { quickSend('이번주 내 업무 알려줘'); };\n\nfunction dateStr(d) {\n  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n}\n\nfunction parseTargetDate(msg) {\n  var now = new Date();\n  var today = dateStr(now);\n  if (msg.indexOf('어제') >= 0) { var d=new Date(now); d.setDate(d.getDate()-1); return {type:'single',date:dateStr(d),label:'어제'}; }\n  if (msg.indexOf('그저께') >= 0 || msg.indexOf('그제') >= 0) { var d=new Date(now); d.setDate(d.getDate()-2); return {type:'single',date:dateStr(d),label:'그저께'}; }\n  if (msg.indexOf('이번주') >= 0 || msg.indexOf('주간') >= 0) { var m=new Date(now); m.setDate(now.getDate()-((now.getDay()+6)%7)); return {type:'range',from:dateStr(m),to:today,label:'이번주'}; }\n  if (msg.indexOf('지난주') >= 0) { var m=new Date(now); m.setDate(now.getDate()-((now.getDay()+6)%7)-7); var s=new Date(m); s.setDate(m.getDate()+6); return {type:'range',from:dateStr(m),to:dateStr(s),label:'지난주'}; }\n  var rm = msg.match(/최근\\s*(\\d+)일/);\n  if (rm) { var d=new Date(now); d.setDate(d.getDate()-parseInt(rm[1])); return {type:'range',from:dateStr(d),to:today,label:'최근 '+rm[1]+'일'}; }\n  var dm = msg.match(/(\\d{1,2})월\\s*(\\d{1,2})일/);\n  if (dm) { return {type:'single',date:now.getFullYear()+'-'+dm[1].padStart(2,'0')+'-'+dm[2].padStart(2,'0'),label:dm[1]+'월 '+dm[2]+'일'}; }\n  return {type:'single',date:today,label:'오늘'};\n}\n\nfunction getEntriesByDate(dateInfo) {\n  var all = Object.values(fbEntries);\n  if (dateInfo.type === 'single') return all.filter(function(e) { return e.date === dateInfo.date; });\n  return all.filter(function(e) { return e.date >= dateInfo.from && e.date <= dateInfo.to; }).sort(function(a,b) { return (b.ts||0)-(a.ts||0); });\n}\n\nfunction buildContext(userMsg) {\n  var now = new Date();\n  var today = dateStr(now);\n  var projList = Object.values(fbProjects).map(function(p) { return p.name; }).join(', ');\n  var dateInfo = parseTargetDate(userMsg);\n  var entries = getEntriesByDate(dateInfo);\n  var entriesStr = entries.length > 0\n    ? entries.slice(0,20).map(function(e) {\n        return dateInfo.type==='range'\n          ? '['+e.date+'] '+e.name+'('+(e.tag||'')+'): '+(e.task||'')\n          : '- '+e.name+'('+(e.tag||'')+'): '+(e.task||'')+' '+(e.startTime?e.startTime+'~'+e.endTime:'');\n      }).join('\\n')\n    : '등록된 업무 없음';\n  return '당신은 건축 설계 회사 EXHEOH의 AI 어시스턴트 JARVIS입니다.\\n오늘 날짜: '+today+'\\n\\n[프로젝트 목록 (총 '+Object.values(fbProjects).length+'개)]\\n'+Object.values(fbProjects).map(function(p,i){return (i+1)+'. '+p.name+(p.client?' ('+p.client+')':'');}).join('\\n')+'\\n\\n['+dateInfo.label+' 업무 내역 (총 '+entries.length+'건)]\\n'+entriesStr+'\\n\\n★ 규칙: 위 데이터에 있는 내용만 답변하세요. 데이터에 없으면 \"데이터에 없습니다\"라고 하세요. 숫자는 반드시 위 목록을 직접 세어서 답변하세요. 추측 금지. 한국어로 간결하게 답변.\\n사용자: '+userMsg+'\\nJARVIS:';\n}\n\nfunction parseDateTime(msg) {\n  var now = new Date();\n  var m1 = msg.match(/(\\d{1,2})월\\s*(\\d{1,2})일.*?(\\d{1,2})시(?:\\s*(\\d{1,2})분)?/);\n  if (m1) { return now.getFullYear()+'-'+m1[1].padStart(2,'0')+'-'+m1[2].padStart(2,'0')+' '+m1[3].padStart(2,'0')+':'+(m1[4]||'00').padStart(2,'0'); }\n  var m2 = msg.match(/(오전|오후)\\s*(\\d{1,2})시(?:\\s*(\\d{1,2})분)?/);\n  if (m2) { var h=parseInt(m2[2]); if(m2[1]==='오후'&&h<12) h+=12; if(m2[1]==='오전'&&h===12) h=0; return dateStr(now)+' '+String(h).padStart(2,'0')+':'+(m2[3]||'00').padStart(2,'0'); }\n  return null;\n}\n\nasync function loadFirebaseData() {\n  try {\n    var r1 = await fetch(FB_URL+'/entries.json');\n    var r2 = await fetch(FB_URL+'/projects.json');\n    var d1 = await r1.json();\n    var d2 = await r2.json();\n    fbEntries = (d1 && typeof d1 === 'object') ? d1 : {};\n    fbProjects = (d2 && typeof d2 === 'object') ? d2 : {};\n  } catch(e) { console.warn('[JARVIS] Firebase 로드 실패:', e.message); }\n}\n\nasync function checkStatus() {\n  try {\n    var r = await fetch(OLLAMA_URL+'/api/tags', {signal:AbortSignal.timeout(3000)});\n    var dot = document.getElementById('status-dot');\n    var txt = document.getElementById('status-text');\n    if (r.ok) { dot.classList.add('online'); txt.textContent = '온라인'; }\n    else { dot.classList.remove('online'); txt.textContent = '오프라인'; }\n  } catch(e) {\n    document.getElementById('status-dot').classList.remove('online');\n    document.getElementById('status-text').textContent = '오프라인';\n  }\n}\n\nfunction addMsg(role, text) {\n  var welcome = document.getElementById('welcome-screen');\n  var messages = document.getElementById('messages');\n  if (welcome.style.display !== 'none') { welcome.style.display='none'; messages.style.display='flex'; }\n  var div = document.createElement('div');\n  div.className = 'msg '+role;\n  div.innerHTML = '<div class=\"msg-avatar\"><\u002Fdiv><div class=\"msg-bubble\">'+text.replace(/<\u002Fg,'&lt;')+'<\u002Fdiv>';\n  messages.appendChild(div);\n  messages.scrollTop = messages.scrollHeight;\n}\n\nfunction showTyping() {\n  var messages = document.getElementById('messages');\n  var welcome = document.getElementById('welcome-screen');\n  if (welcome.style.display !== 'none') { welcome.style.display='none'; messages.style.display='flex'; }\n  var div = document.createElement('div');\n  div.className = 'msg assistant'; div.id = 'typing';\n  div.innerHTML = '<div class=\"msg-avatar\"><\u002Fdiv><div class=\"msg-bubble\"><div class=\"typing\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv><\u002Fdiv>';\n  messages.appendChild(div);\n  messages.scrollTop = messages.scrollHeight;\n}\n\nfunction hideTyping() { var el=document.getElementById('typing'); if(el) el.remove(); }\n\nfunction detectIntent(msg) {\n  var hasReg = msg.indexOf('등록') >= 0 || msg.indexOf('추가') >= 0 || msg.indexOf('해줘') >= 0\n            || msg.indexOf('넣어') >= 0 || msg.indexOf('설정') >= 0 || msg.indexOf('잡아') >= 0\n            || msg.indexOf('걸어') >= 0;\n  var isAlert = msg.indexOf('알림') >= 0 || msg.indexOf('리마인더') >= 0 || msg.indexOf('reminder') >= 0;\n  if (isAlert && hasReg) return 'alert';\n  if (isAlert && /\\d{1,2}월\\s*\\d{1,2}일/.test(msg)) return 'alert';\n  if (hasReg && msg.indexOf('프로젝트') >= 0) return 'project';\n  if (hasReg && (msg.indexOf('업무') >= 0 || msg.indexOf('했어') >= 0 || msg.indexOf('완료') >= 0 || msg.indexOf('작업') >= 0)) return 'entry';\n  // 직접 계산 가능한 조회\n  var isCount = msg.indexOf('몇개') >= 0 || msg.indexOf('몇 개') >= 0 || msg.indexOf('갯수') >= 0 || msg.indexOf('개수') >= 0 || msg.indexOf('몇건') >= 0;\n  var isList  = msg.indexOf('목록') >= 0 || msg.indexOf('알려줘') >= 0 || msg.indexOf('보여줘') >= 0 || msg.indexOf('뭐있어') >= 0 || msg.indexOf('뭐야') >= 0;\n  var isProj  = msg.indexOf('프로젝트') >= 0;\n  if (isProj && (isCount || isList)) return 'proj_query';\n  // 담당자 조회: \"홍길동 담당\", \"홍길동 프로젝트\", \"담당자 누구\", \"누가 담당\"\n  var isManager = msg.indexOf('담당') >= 0 || msg.indexOf('맡고') >= 0 || msg.indexOf('맡은') >= 0;\n  if (isManager) return 'manager_query';\n  return 'query';\n}\n\n// 프로젝트 직접 조회 (AI 없이 Firebase 데이터로 정확히 답변)\nfunction handleProjQuery(msg) {\n  var projects = Object.values(fbProjects);\n  // 건설사 필터 추출: \"현대건설 프로젝트\", \"롯데건설 프로젝트\" 등\n  var clientFilter = null;\n  var clientMatch = msg.match(/([가-힣]+(?:건설|산업|종합|개발|주택|엔지니어링|건축|리얼티|E&C|enc|ENC))/);\n  if (clientMatch) clientFilter = clientMatch[1];\n\n  var filtered = clientFilter\n    ? projects.filter(function(p) { return p.client && p.client.indexOf(clientFilter) >= 0; })\n    : projects;\n\n  var count = filtered.length;\n  var isCount = msg.indexOf('몇개') >= 0 || msg.indexOf('몇 개') >= 0 || msg.indexOf('갯수') >= 0 || msg.indexOf('개수') >= 0;\n\n  if (count === 0) {\n    return (clientFilter ? clientFilter+'의 ' : '')+'프로젝트가 없어요.';\n  }\n  var listStr = filtered.map(function(p, i) { return (i+1)+'. '+p.name+(p.client?' ('+p.client+')':''); }).join('\\n');\n  if (isCount) {\n    return (clientFilter ? clientFilter+' ' : '')+'프로젝트는 총 '+count+'개입니다.\\n\\n'+listStr;\n  }\n  return (clientFilter ? clientFilter+' ' : '')+'프로젝트 목록 ('+count+'개):\\n\\n'+listStr;\n}\n\n// 담당자 직접 조회 (AI 없이 Firebase 데이터로 정확히 답변)\nfunction handleManagerQuery(msg) {\n  var projects = Object.values(fbProjects);\n\n  // 1) 특정 프로젝트의 담당자 묻기: \"고양창릉 담당자 누구야\"\n  var projMatch = null;\n  for (var i = 0; i < projects.length; i++) {\n    if (projects[i].name && msg.indexOf(projects[i].name) >= 0) { projMatch = projects[i]; break; }\n  }\n  if (projMatch) {\n    var managers = [];\n    if (projMatch.design)   managers.push('설계 담당: ' + projMatch.design);\n    if (projMatch.eng)      managers.push('엔지니어링 담당: ' + projMatch.eng);\n    if (projMatch.manager)  managers.push('담당자: ' + projMatch.manager);\n    if (managers.length === 0) return '📁 ' + projMatch.name + '\\n담당자 정보가 없어요.';\n    return '📁 ' + projMatch.name + ' 담당자\\n\\n' + managers.join('\\n');\n  }\n\n  // 2) 특정 담당자가 맡은 프로젝트 묻기: \"홍길동 담당 프로젝트\", \"홍길동 맡은 거\"\n  // 직함 키워드는 이름으로 뽑지 않음\n  var titleWords = ['담당','책임','팀장','대리','과장','부장','선임','수석','주임','사원','설정','알림','등록','추가','프로젝트','업무','작업','확인','조회','목록','현황','맡고','맡은'];\n  var nameMatch = msg.match(/([가-힣]{2,4})(?:\\s*(?:씨|님|이|가|은|는|의))?\\s*(?:담당|맡고|맡은|프로젝트)/);\n  if (!nameMatch) nameMatch = msg.match(/([가-힣]{2,4})\\s*(?:책임|팀장|대리|과장|부장|선임|수석|주임)?\\s*담당/);\n  if (nameMatch && titleWords.indexOf(nameMatch[1]) >= 0) nameMatch = null;\n\n  if (nameMatch) {\n    var name = nameMatch[1];\n    // Firebase에 \"박제정 책임\", \"박제정\" 등 다양하게 저장될 수 있으므로\n    // 이름이 포함된 값과 정확히 매칭 (이름 시작 부분 일치)\n    // \"박제정 책임\", \"박제정책임\", \"박제정\" → 공백/직함 제거 후 이름만 비교\n    var titleSuffix = ['책임','팀장','실장','선임','수석','주임','대리','과장','부장','사원'];\n    function stripTitle(val) {\n      if (!val) return '';\n      var s = val.replace(/\\s+/g, '');\n      for (var ti = 0; ti < titleSuffix.length; ti++) {\n        if (s.slice(-titleSuffix[ti].length) === titleSuffix[ti]) {\n          s = s.slice(0, s.length - titleSuffix[ti].length); break;\n        }\n      }\n      return s;\n    }\n    function matchName(fieldVal, n) {\n      return stripTitle(fieldVal) === n;\n    }\n    var matched = projects.filter(function(p) {\n      return matchName(p.design, name) || matchName(p.eng, name) || matchName(p.manager, name);\n    });\n    if (matched.length === 0) return name + '님이 담당한 프로젝트가 없어요.';\n    var listStr = matched.map(function(p, i) {\n      var role = [];\n      if (matchName(p.design,  name)) role.push('설계');\n      if (matchName(p.eng,     name)) role.push('엔지니어링');\n      if (matchName(p.manager, name)) role.push('담당');\n      return (i+1) + '. ' + p.name + (p.client ? ' ('+p.client+')' : '') + ' [' + role.join('/') + ']';\n    }).join('\\n');\n    return name + '님 담당 프로젝트 ('+matched.length+'개):\\n\\n' + listStr;\n  }\n\n  // 3) 전체 담당자 목록: \"담당자 목록\", \"누가 담당하고 있어\"\n  // 전체 담당자 목록: 공백/직함 제거 후 이름 기준으로 그룹핑\n  var titleSuffix2 = ['책임','팀장','실장','선임','수석','주임','대리','과장','부장','사원'];\n  function stripTitle2(val) {\n    if (!val) return '';\n    var s = val.replace(/\\s+/g, '');\n    for (var ti = 0; ti < titleSuffix2.length; ti++) {\n      if (s.slice(-titleSuffix2[ti].length) === titleSuffix2[ti]) {\n        s = s.slice(0, s.length - titleSuffix2[ti].length); break;\n      }\n    }\n    return s;\n  }\n  var managerMap = {};\n  projects.forEach(function(p) {\n    [p.design, p.eng, p.manager].forEach(function(m) {\n      if (!m || m === '미정') return;\n      var cleanName = stripTitle2(m);\n      if (!cleanName) return;\n      if (!managerMap[cleanName]) managerMap[cleanName] = [];\n      if (managerMap[cleanName].indexOf(p.name) < 0) managerMap[cleanName].push(p.name);\n    });\n  });\n  var names = Object.keys(managerMap);\n  if (names.length === 0) return '담당자 정보가 없어요.';\n  return '👥 담당자 목록 ('+names.length+'명):\\n\\n' +\n    names.map(function(n) { return '• ' + n + ' — ' + managerMap[n].length + '개 프로젝트'; }).join('\\n');\n}\n\nasync function sendMsg() {\n  if (isTyping) return;\n  var inp = document.getElementById('input');\n  var msg = inp.value.trim();\n  if (!msg) return;\n  inp.value = '';\n  addMsg('user', msg);\n  isTyping = true;\n  document.getElementById('send-btn').disabled = true;\n  showTyping();\n\n  var intent = detectIntent(msg);\n\n  try {\n    if (intent === 'proj_query') {\n      hideTyping();\n      addMsg('assistant', handleProjQuery(msg));\n    } else if (intent === 'manager_query') {\n      hideTyping();\n      addMsg('assistant', handleManagerQuery(msg));\n    } else if (intent === 'alert') {\n      var dt = parseDateTime(msg);\n      // 알림 내용 추출 개선: 날짜/시간/알림/등록/설정/해줘 제거 후 나머지를 내용으로\n      var content = msg\n        .replace(/\\d{1,2}월\\s*\\d{1,2}일/g,'')\n        .replace(/(오전|오후)?\\s*\\d{1,2}시(\\s*\\d{1,2}분)?/g,'')\n        .replace(/알림|등록|추가|해줘|설정|잡아|걸어|넣어|리마인더/g,'')\n        .replace(/\\s+/g,' ').trim();\n      if (!content) content = '알림';\n      if (dt) {\n        var payload = {author:'JARVIS', datetime:dt, content:content, notified:false, ts:Date.now()};\n        var res = await fetch(FB_URL+'/userAlerts.json', {\n          method:'POST',\n          headers:{'Content-Type':'application/json'},\n          body:JSON.stringify(payload)\n        });\n        var resData = await res.json();\n        hideTyping();\n        if (res.ok && resData && resData.name) {\n          addMsg('assistant', '✅ 알림 등록 완료!\\n\\n📅 일시: '+dt+'\\n📝 내용: '+content);\n        } else {\n          addMsg('assistant', '❌ 알림 등록 실패했어요.\\n상태코드: '+res.status+'\\n응답: '+JSON.stringify(resData));\n        }\n      } else {\n        hideTyping();\n        addMsg('assistant', '날짜/시간을 포함해주세요.\\n예: \"5월 21일 오후 2시 납품 마감 알림 설정해줘\"');\n      }\n    } else if (intent === 'entry') {\n      var parsePrompt = '다음 텍스트에서 업무 정보를 추출해서 JSON만 출력하세요:\\n텍스트: \"'+msg+'\"\\n형식: {\"name\":\"이름\",\"task\":\"업무내용\",\"date\":\"'+dateStr(new Date())+'\",\"startTime\":\"\",\"endTime\":\"\",\"tag\":\"작업중\"}\\nJSON만:';\n      var r = await fetch(OLLAMA_URL+'/api/generate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,prompt:parsePrompt,stream:false})});\n      var data = await r.json();\n      var jsonStr = data.response.match(/\\{[\\s\\S]*\\}/)?.[0];\n      if (jsonStr) {\n        var parsed = JSON.parse(jsonStr);\n        var projMatch = Object.entries(fbProjects).find(function(kv) { return msg.indexOf(kv[1].name) >= 0; });\n        parsed.projectId = projMatch ? projMatch[0] : '';\n        parsed.ts = Date.now();\n        var res = await fetch(FB_URL+'/entries.json', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(parsed)});\n        hideTyping();\n        addMsg('assistant', res.ok ? '✅ 업무 등록 완료!\\n\\n👤 '+parsed.name+'\\n📝 '+parsed.task+'\\n📅 '+parsed.date+'\\n🏷 '+parsed.tag : '❌ 등록 실패했어요.');\n      } else {\n        hideTyping();\n        addMsg('assistant', '업무 내용을 더 자세히 말씀해주세요.\\n예: \"홍길동 오늘 고양창릉 현장 작업완료로 등록해줘\"');\n      }\n    } else if (intent === 'project') {\n      var parsePrompt = '다음 텍스트에서 프로젝트 정보를 추출해서 JSON만 출력하세요:\\n텍스트: \"'+msg+'\"\\n형식: {\"code\":\"\",\"name\":\"프로젝트명\",\"client\":\"\",\"design\":\"\",\"eng\":\"\"}\\nJSON만:';\n      var r = await fetch(OLLAMA_URL+'/api/generate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,prompt:parsePrompt,stream:false})});\n      var data = await r.json();\n      var jsonStr = data.response.match(/\\{[\\s\\S]*\\}/)?.[0];\n      if (jsonStr) {\n        var parsed = JSON.parse(jsonStr);\n        var res = await fetch(FB_URL+'/projects.json', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(parsed)});\n        hideTyping();\n        addMsg('assistant', res.ok ? '✅ 프로젝트 등록 완료!\\n\\n📁 '+parsed.name : '❌ 등록 실패했어요.');\n        await loadFirebaseData();\n      } else {\n        hideTyping();\n        addMsg('assistant', '프로젝트명을 포함해주세요.');\n      }\n    } else {\n      var r = await fetch(OLLAMA_URL+'/api/generate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,prompt:buildContext(msg),stream:false})});\n      var data = await r.json();\n      hideTyping();\n      addMsg('assistant', data.response || '답변을 생성하지 못했어요.');\n    }\n  } catch(e) {\n    hideTyping();\n    addMsg('assistant', '❌ 오류가 발생했어요: '+e.message);\n  }\n\n  isTyping = false;\n  document.getElementById('send-btn').disabled = false;\n}\n\nfunction quickSend(msg) {\n  document.getElementById('input').value = msg;\n  sendMsg();\n}\n\ncheckStatus();\nsetInterval(checkStatus, 30000);\nloadFirebaseData();\nsetInterval(loadFirebaseData, 60000);\ndocument.getElementById('input').focus();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
